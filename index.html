<!DOCTYPE html>
<html>

<head lang="en">
	<meta charset="UTF-8">
	<title>HTML5流星雨动画背景特效 - A5源码</title>

	<script type="text/javascript" src="comonjs/jquery-1.11.2.min.js"></script>
	<script type="text/javascript" src="comonjs/modernizr-2.6.2.min.js"></script>
	<script type="text/javascript" src="js/starbg.js"></script>
	<link type="text/css" rel="stylesheet" href="css/star.css" />
	<link type="text/css" rel="stylesheet" href="css/styles.css" />
	<style>
		* {
			margin: 0;
			padding: 0;
		}

		canvas {
			display: block;
			margin: 0;
			width: 100%;
			height: 100%;
			position: fixed;
			left: 0;
			right: 0;
			top: 0;
			bottom: 0;
			z-index: -1;
		}

		.content {
			width: 1144px;
			margin: 0 auto;
			padding-top: 200px;
		}

		.rabitBg {
			position: fixed;
			left: 0;
			top: 50%;
		}
	</style>

</head>

<body>
	<canvas id="fullstarbg"></canvas>
	<div class="content">
		<img src="rabit.png" class="rabitBg" />

	</div>
	<div class="container">
		<div class="balloon">
			<div><span>陈</span>
			</div>
			<div><span>圆</span>
			</div>
			<div><span>圆</span>
			</div>
			<div><span>生</span>
			</div>
			<div><span>日</span>
			</div>
			<div><span>快</span>
			</div>
			<div><span>乐</span>
			</div>
			<div><span>!</span>
			</div>
		</div>
	</div>
	<script>
		$(".input_cover").mousedown(function () {
			$(this).hide();
			$(this).siblings("input").addClass("cur");
			$("#sercHead").focus();
			return false;

		})
		$("#sercHead").blur(function () {
			$(this).removeClass("cur");
			if ($(this).val() == '') {
				$(this).siblings(".input_cover").show();
			}
		})
	</script>


</body>

</html>
